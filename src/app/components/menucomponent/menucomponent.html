<div class="container">
  <mat-toolbar class="custom-toolbar">
    <button
      matButton
      class="btn-rojo"
      aria-label="Example icon-button with menu icon"
      [matMenuTriggerFor]="menuProyecto"
    >
      <mat-icon>android</mat-icon>
      Proyecto
    </button>
  </mat-toolbar>

  <mat-menu #menuProyecto="matMenu">
    <button mat-menu-item routerLink="">
      <mat-icon>add</mat-icon>
      Registrar
    </button>
    <button mat-menu-item routerLink="/proyectos/listar">
      <mat-icon>list</mat-icon>
      Lista
    </button>
  </mat-menu>
</div>
