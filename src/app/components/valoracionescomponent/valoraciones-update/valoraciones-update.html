<div class="container">
  <div>
    <h2>Editar Valoración</h2>
  </div>
  <div>
    <form [formGroup]="form" (submit)="actualizar()">
      <mat-form-field appearance="fill">
        <mat-label>ID</mat-label>
        <input matInput formControlName="idValoracion" readonly />
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Id Proyecto</mat-label>
        <input matInput formControlName="idProyecto" type="number" required />
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Puntuación</mat-label>
        <input matInput formControlName="puntuacion" type="number" required />
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Comentario</mat-label>
        <input matInput formControlName="comentario" required />
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit">Actualizar</button>
    </form>
  </div>
</div>
